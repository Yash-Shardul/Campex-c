<!-- Background Music Controls -->
<div id="bg-music-control" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 18px;
  border-radius: 10px;
  font-family: sans-serif;
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  z-index: 999;
">
  🔊 
</div>

<script>
  // Create background music element
  const bgMusic = new Audio("audio/bgMusic.mp3");
  bgMusic.loop = true;
  bgMusic.volume = 0.5;

  // Autoplay workaround for Chrome (user interaction required sometimes)
  document.addEventListener("click", () => {
    if (bgMusic.paused) bgMusic.play().catch(() => {});
  }, { once: true });

  // Try autoplay when page loads (works in most browsers)
  window.addEventListener("load", () => {
    bgMusic.play().catch(() => {
      console.log("Autoplay blocked until user interaction.");
    });
  });

  // Toggle mute/unmute
  const control = document.getElementById("bg-music-control");
  control.addEventListener("click", () => {
    if (bgMusic.muted) {
      bgMusic.muted = false;
      control.textContent = "🔊";
    } else {
      bgMusic.muted = true;
      control.textContent = "🔈";
    }
  });
</script>


<!-- 💬 Popup for Guide Text -->

<!-- Map -->
<div id="mapModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;

  z-index:9999;
">

  <div style="
    width:80%;
    height:80%;
    background:#fff;
    margin:5% auto;
    border-radius:10px;
    padding:10px;
    position:relative;
  ">

    <span id="closeMap" style="
      position:absolute;
      right:15px;
      top:10px;
      font-size:24px;
      color:#111;
      cursor:pointer;
    ">✖</span>

    <div style="margin-bottom:8px;">
      <button onclick="filterPlaces('all')">All</button>
      <button onclick="filterPlaces('cafe')">Cafes</button>
      <button onclick="filterPlaces('hostel')">Hostels</button>
      <button onclick="filterPlaces('stationery')">Stationery</button>
    </div>

    <div id="map" style="height:90%;"></div>

  </div>
</div>
<script>
/* ================= SAFE MAP MODULE ================= */

(function() {

let map = null;
let markers = [];

const collegeCoords = [20.01491811770932, 73.76383800849092];

const places = [
  { name: "KBT Cafe", coords: [20.01548864804234, 73.76343532122627], category: "cafe" },
  { name: "Chai Villa", coords: [20.017015007968148, 73.76148964327574], category: "cafe" },
  { name: "Diploma college", coords: [20.01494324376624, 73.7655259201133], category: "college" },
  { name: "Law college", coords: [20.01567814274949, 73.76188473533959], category: "college" },
  { name: "ITI college", coords: [20.01495227391913, 73.76284791796611], category: "college" },
  { name: "Jai Hind Bhavan", coords: [20.01559475361794, 73.76110505404625], category: "hostel" },
  { name: "Girls Hostel", coords: [20.014628911041488, 73.76341644782599], category: "hostel" },
  { name: "CPG BOYS Hostel", coords: [20.01199841285143, 73.76456174347065], category: "hostel" },
  { name: "Archit Stationary & Xerox", coords: [20.013645233873323, 73.76171254396085], category: "stationery" },
  { name: "Bahucharaji Copy Zone & Xerox", coords: [20.013157425130693, 73.76100639981583], category: "stationery" }
];

/* ================= ICONS ================= */

const icons = {
  cafe: L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
    iconSize: [32, 32]
  }),
  hostel: L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
    iconSize: [32, 32]
  }),
  stationery: L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
    iconSize: [32, 32]
  }),
  college: L.icon({
    iconUrl: "https://maps.google.com/mapfiles/ms/icons/yellow-dot.png",
    iconSize: [32, 32]
  })
};

/* ================= INIT MAP ================= */

function initMap() {
  if (map) return;

  map = L.map('map').setView(collegeCoords, 17);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  L.marker(collegeCoords)
    .addTo(map)
    .bindPopup("College");

/* ================= LEGEND ================= */

  const legend = L.control({ position: "bottomright" });

  legend.onAdd = function () {
    const div = L.DomUtil.create("div");

    div.style.background = "white";
    div.style.padding = "10px";
    div.style.borderRadius = "8px";
    div.style.fontSize = "13px";
    div.style.lineHeight = "18px";
    div.style.color = "#000";   // ✅ IMPORTANT (text visible)
    div.style.boxShadow = "0 0 6px rgba(0,0,0,0.3)";

    div.innerHTML = `
      <span style="color:#000;">🔴 Cafe</span><br>
      <span style="color:#000;">🔵 Hostel</span><br>
      <span style="color:#000;">🟢 Stationery</span><br>
      <span style="color:#000;">🟡 College</span>
    `;

    return div;
  };

  legend.addTo(map);

  loadMarkers();
}

/* ================= LOAD MARKERS ================= */

function loadMarkers(filter = 'all') {

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  places.forEach(p => {

    if (filter !== 'all' && p.category !== filter) return;

    const m = L.marker(p.coords, {
      icon: icons[p.category] || icons.cafe
    })
    .addTo(map)
    .bindTooltip(`${p.name} (Click for directions)`, {
      permanent: false,
      direction: "top"
    });

    /* ✅ OPEN GOOGLE MAPS DIRECTIONS */
    m.on("click", () => {
      const url = `https://www.google.com/maps/dir/?api=1&destination=${p.coords[0]},${p.coords[1]}`;
      window.open(url, "_blank");
    });

    markers.push(m);
  });
}
/* ================= FILTER ================= */

window.filterPlaces = function(category) {
  loadMarkers(category);
};

/* ================= UI CONTROLS ================= */

const mapBtn = document.getElementById("mapButton");
const modal = document.getElementById("mapModal");
const closeBtn = document.getElementById("closeMap");

/* ✅ FIXED CLICK FOR <a> BUTTON */
if (mapBtn) {
  mapBtn.onclick = function(e) {
    e.preventDefault();   // 🔥 important for <a>
    e.stopPropagation();  // 🔥 prevents Marzipano blocking

    modal.style.display = "block";

    setTimeout(() => {
      initMap();
      map.invalidateSize(); // FIX blank map
    }, 100);
  };
}

/* CLOSE BUTTON */
if (closeBtn) {
  closeBtn.onclick = function() {
    modal.style.display = "none";
  };
}

/* CLICK OUTSIDE */
if (modal) {
  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
    }
  });
}

/* ESC KEY */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    modal.style.display = "none";
  }
});

})();
</script>
